<div class="min-h-screen w-full bg-slate-950 flex flex-col items-center justify-center p-6 text-slate-100">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl flex flex-col gap-6">
    
    <!-- Header/Branding -->
    <div class="flex flex-col items-center text-center gap-3">
      <div class="w-16 h-16 rounded-2xl bg-kfh-green flex items-center justify-center shadow-lg shadow-kfh-green/20">
        <!-- Brand Icon/Key -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight text-white mt-2">لوحة تحكم المشرف</h1>
      <p class="text-slate-400 text-sm">الرجاء تسجيل الدخول للتحقق من هوية العملاء</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage()" class="bg-red-950/50 border border-red-800 text-red-200 text-sm px-4 py-3.5 rounded-xl flex items-center gap-2 animate-pulse">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <!-- Form fields -->
    <form class="flex flex-col gap-5 mt-2" (submit)="onSubmit(); $event.preventDefault()">
      <!-- Email Input -->
      <app-input 
        [label]="'البريد الإلكتروني للموظف'" 
        [placeholder]="'admin@kfh.com'" 
        [disabled]="loading()"
        [ngModel]="email()" 
        (ngModelChange)="email.set($event)" 
        name="email"
      ></app-input>

      <!-- Password Input -->
      <app-input 
        [label]="'كلمة المرور'" 
        [placeholder]="'••••••••'" 
        [type]="'password'"
        [disabled]="loading()"
        [ngModel]="password()" 
        (ngModelChange)="password.set($event)" 
        name="password"
      ></app-input>

      <div class="flex flex-col gap-4 mt-4">
        <app-button type="submit" [loading]="loading()" [disabled]="!isFormValid">
          تسجيل الدخول كمشرف
        </app-button>
        
        <!-- Back to customer login -->
        <a href="/" class="text-slate-400 hover:text-white text-center text-sm font-semibold transition-colors duration-200">
          العودة لشاشة الدخول للعملاء
        </a>
      </div>
    </form>

  </div>
</div>

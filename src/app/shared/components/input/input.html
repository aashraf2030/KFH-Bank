<div class="w-full flex flex-col gap-1.5">
  <!-- Input Label -->
  <label 
    *ngIf="label" 
    [for]="inputId" 
    class="text-sm font-semibold text-[#7a7a7a] block select-none px-1"
  >
    {{ label }}
  </label>

  <!-- Input Wrapper -->
  <div 
    class="relative flex items-center border border-[#e5e7eb] rounded-xl bg-white transition-all duration-200 focus-within:border-kfh-green focus-within:ring-2 focus-within:ring-kfh-green/15"
    [class.border-red-500]="hasError"
    [class.focus-within:border-red-500]="hasError"
    [class.focus-within:ring-red-500/15]="hasError"
    [class.bg-gray-50]="disabled || loading"
    [class.cursor-not-allowed]="disabled || loading"
    [class.animate-pulse]="loading"
  >
    <!-- Info Icon (Left side in RTL) -->
    <div 
      *ngIf="showInfoIcon && !loading"
      class="flex items-center justify-center ps-4 text-[#1e293b] hover:text-kfh-green cursor-pointer transition-colors"
      (click)="onInfoClick($event)"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
      </svg>
    </div>

    <!-- Spinner Icon if loading -->
    <div 
      *ngIf="loading"
      class="flex items-center justify-center ps-4 text-kfh-green"
    >
      <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>

    <input
      [id]="inputId"
      [type]="type"
      [placeholder]="placeholder"
      [disabled]="disabled || loading"
      [(ngModel)]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="w-full py-4 px-4 bg-transparent text-[#1e293b] placeholder-gray-400 focus:outline-none text-base border-none outline-none font-medium leading-none"
      [class.pe-4]="!showInfoIcon && !loading"
      [class.ps-2]="showInfoIcon || loading"
    />
  </div>
</div>
